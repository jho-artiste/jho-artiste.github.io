<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Œuvre — jho</title>
<meta name="description" content="Détail d'une œuvre de jho.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<script src="assets/js/components.js" defer></script>
<script src="assets/js/works.js" defer></script>
</head>
<body>

<jho-header active="galerie"></jho-header>

<div class="back-bar">
  <a href="galerie.html" class="back-btn">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Retour
  </a>
</div>

<section class="work-detail">

  <!-- Colonne gauche : carrousel + loupe + nav -->
  <div class="work-carousel-col">
    <div class="carousel-row">
      <button class="carousel-arrow carousel-prev" id="carouselPrev" aria-label="Précédent" hidden>
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M11 4L6 9L11 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="work-carousel-wrap" id="carouselWrap">
        <div class="carousel-slides" id="carouselSlides"></div>

        <!-- Loupe : calque cloné zoomé + cercle décoratif -->
        <div class="lens-clone" id="lensClone">
          <img id="lensCloneImg" src="" alt="" aria-hidden="true" draggable="false">
        </div>
        <div class="lens-ring" id="lensRing"></div>
      </div>

      <button class="carousel-arrow carousel-next" id="carouselNext" aria-label="Suivant" hidden>
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M7 4L12 9L7 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <!-- Dots en dehors de l'image, sous la colonne -->
    <div class="carousel-dots" id="carouselDots"></div>
  </div>

  <!-- Colonne droite : infos -->
  <div class="work-info">
    <h1 data-field="title-h1">…</h1>
    <p class="lead" data-field="description">…</p>

    <div class="specs" data-field="specs"></div>

    <div class="price" data-field="price-block" hidden>
      <span class="label">Prix</span>
      <span class="value" data-field="price">—</span>
    </div>

    <a href="contact.html" class="cta-link">Demander cette œuvre</a>
  </div>
</section>

<section class="related-works">
  <div class="related-head">
    <h2>Œuvres associées</h2>
    <a href="galerie.html" class="back-btn back-btn-forward">
      Toute la galerie
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M6 3L11 8L6 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>
  <ul class="expanding-cards" data-grid="related"></ul>
</section>

<jho-footer></jho-footer>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var slug = new URLSearchParams(location.search).get('w');
    var work = (slug && JHO.findWork(slug)) || window.JHO_WORKS[0];
    if (!work) return;

    document.title = work.title + ' — jho';

    var $ = function (sel) { return document.querySelector(sel); };
    var setText = function (sel, txt) { var el = $(sel); if (el) el.textContent = txt; };

    setText('[data-field="title-h1"]',    work.title);
    setText('[data-field="description"]', work.description || '');

    var kindLabel         = { original: 'Jho création', custom: 'Personnalisé' }[work.kind] || '—';
    var categoryLabel     = { tableau:  'Tableau',      vetement: 'Vêtement'    }[work.category] || 'Tableau';
    var availabilityLabel = { available: 'Disponible',  sold: 'Vendu'           }[work.status] || '—';

    var specs = [
      ['Année',         work.year],
      ['Type',          kindLabel],
      ['Catégorie',     categoryLabel],
      ['Dimensions',    work.size],
      ['Disponibilité', availabilityLabel],
    ];
    $('[data-field="specs"]').innerHTML = specs.map(function (row) {
      return '<div class="spec-row"><span class="k">' + JHO.escapeHtml(row[0]) + '</span><span class="v">' + JHO.escapeHtml(row[1]) + '</span></div>';
    }).join('');

    if (work.price) {
      $('[data-field="price-block"]').hidden = false;
      setText('[data-field="price"]', work.price);
    }

    var images = (work.images && work.images.length) ? work.images : (work.img ? [work.img] : []);
    JHO.initCarousel(images, work);

    JHO.renderExpandingCards('[data-grid="related"]', { exclude: work.slug, limit: 5 });
  });
</script>
</body>
</html>
