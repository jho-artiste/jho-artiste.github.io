<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galerie — jho</title>
<meta name="description" content="Galerie d'œuvres de jho — peintures originales.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<script src="assets/js/preloader.js" defer></script>
<script src="assets/js/smooth-scroll.js" defer></script>
<script src="assets/js/site-anim.js" defer></script>
<script src="assets/js/components.js" defer></script>
<script src="assets/js/works.js" defer></script>
</head>
<body>
<div id="preloader" aria-hidden="true"><span class="preloader-num">0</span></div>

<jho-header active="galerie"></jho-header>

<section class="page-head">
  <div class="eyebrow-muted">Galerie</div>
  <h1>Œuvres</h1>
  <p>L'ensemble des toiles disponibles ou archivées. Cliquez sur une œuvre pour en découvrir le détail.</p>
</section>

<section class="filters">
  <nav class="filter-nav">
    <button type="button" class="filter-chip filter-reset active" data-group="reset">Tout</button>

    <div class="filter-menu" data-group="category">
      <button type="button" class="filter-trigger" aria-haspopup="true">
        <span class="label">Catégorie</span>
        <svg class="chevron" viewBox="0 0 12 12" width="10" height="10" aria-hidden="true">
          <path d="M2 4 L6 8 L10 4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="filter-panel" role="menu">
        <button type="button" class="filter-chip" data-group="category" data-value="tableau">Tableau</button>
        <button type="button" class="filter-chip" data-group="category" data-value="vetement">Vêtement</button>
      </div>
    </div>

    <div class="filter-menu" data-group="status">
      <button type="button" class="filter-trigger" aria-haspopup="true">
        <span class="label">Disponibilité</span>
        <svg class="chevron" viewBox="0 0 12 12" width="10" height="10" aria-hidden="true">
          <path d="M2 4 L6 8 L10 4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="filter-panel" role="menu">
        <button type="button" class="filter-chip" data-group="status" data-value="available">Disponible</button>
        <button type="button" class="filter-chip" data-group="status" data-value="sold">Vendue</button>
      </div>
    </div>

    <div class="filter-menu" data-group="kind">
      <button type="button" class="filter-trigger" aria-haspopup="true">
        <span class="label">Type</span>
        <svg class="chevron" viewBox="0 0 12 12" width="10" height="10" aria-hidden="true">
          <path d="M2 4 L6 8 L10 4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="filter-panel" role="menu">
        <button type="button" class="filter-chip" data-group="kind" data-value="original">Jho création</button>
        <button type="button" class="filter-chip" data-group="kind" data-value="custom">Personnalisé</button>
      </div>
    </div>
  </nav>
</section>

<section class="works alone">
  <div class="works-grid" data-grid="all"></div>
</section>

<jho-footer></jho-footer>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    JHO.renderGrid('[data-grid="all"]', { size: 'tall', enable3d: true });
    JHO.initFilters({ cards: '[data-grid="all"] .work-card' });
  });
</script>
</body>
</html>
